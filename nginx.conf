server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    # text/html is always compressed by nginx; listing it again causes a warning
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── API reverse proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;

        # Standard forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Disable keep-alive connection reuse to the upstream
        proxy_set_header Connection "";

        # Give systemctl/journalctl calls enough headroom
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        # Return a clean JSON error when the backend is not yet up
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_unavailable;
    }

    # Friendly error returned while the backend container is starting
    location @backend_unavailable {
        default_type application/json;
        return 503 '{"detail":"Backend service is starting, please retry","code":"SERVICE_UNAVAILABLE"}';
    }

    # ── Static asset caching (Vite content-hashed filenames) ─────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback: every non-file request serves index.html ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
