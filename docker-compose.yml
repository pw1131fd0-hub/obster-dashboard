version: '3.8'

# =============================================================================
# obster-dashboard Docker Compose Configuration
# Full stack: nginx (reverse proxy + static) + FastAPI backend
# =============================================================================

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  obster-network:
    driver: bridge

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── nginx: static SPA + reverse proxy ──────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    image: obster-dashboard:latest
    container_name: obster-dashboard-nginx
    ports:
      - "80:80"
    volumes:
      - /var/run/dbus:/var/run/dbus:ro
      - /run/systemd:/run/systemd:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-30000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - obster-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── backend: FastAPI / uvicorn ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: obster-backend:latest
    container_name: obster-dashboard-backend
    ports:
      - "8000:8000"
    volumes:
      - /home/crawd_user/project:/home/crawd_user/project:ro
      - /home/crawd_user/.openclaw/workspace/logs:/home/crawd_user/.openclaw/workspace/logs:ro
      - /var/run/dbus:/var/run/dbus:ro
      - /run/systemd:/run/systemd:ro
    environment:
      - PROJECTS_PATH=${PROJECTS_PATH:-/home/crawd_user/project}
      - LOGS_PATH=${LOGS_PATH:-/home/crawd_user/.openclaw/workspace/logs/executions}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TIMEOUT_MINUTES=${TIMEOUT_MINUTES:-30}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-30000}
    privileged: true
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request, sys; urllib.request.urlopen('http://localhost:8000/api/health'); sys.exit(0)"
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - obster-network