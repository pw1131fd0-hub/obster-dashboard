version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obster-nginx
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - obster-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: obster-backend
    ports:
      - "8000:8000"
    volumes:
      - /home/crawd_user/project:/home/crawd_user/project:ro
      - /home/crawd_user/.openclaw/workspace/logs:/home/crawd_user/.openclaw/workspace/logs:ro
      - /var/run/dbus:/var/run/dbus:ro
      - /run/systemd:/run/systemd:ro
    environment:
      - PROJECTS_PATH=/home/crawd_user/project
      - LOGS_PATH=/home/crawd_user/.openclaw/workspace/logs/executions
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TIMEOUT_MINUTES=${TIMEOUT_MINUTES:-30}
    restart: unless-stopped
    privileged: true
    networks:
      - obster-network

networks:
  obster-network:
    driver: bridge