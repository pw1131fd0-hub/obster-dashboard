version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - /var/run/dbus:/var/run/dbus:ro
      - /run/systemd:/run/systemd:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    restart: unless-stopped
    networks:
      - obster-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - /home/crawd_user/project:/home/crawd_user/project:ro
      - /home/crawd_user/.openclaw/workspace/logs/executions:/home/crawd_user/.openclaw/workspace/logs/executions:ro
      - /var/run/dbus:/var/run/dbus:ro
      - /run/systemd:/run/systemd:ro
    environment:
      - PROJECTS_PATH=/home/crawd_user/project
      - LOGS_PATH=/home/crawd_user/.openclaw/workspace/logs/executions
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TIMEOUT_MINUTES=30
      - REFRESH_INTERVAL=30000
    restart: unless-stopped
    privileged: true
    networks:
      - obster-network

networks:
  obster-network:
    driver: bridge