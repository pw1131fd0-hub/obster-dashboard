version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obster-nginx
    ports:
      - "80:80"
    volumes:
      # Systemd sockets for cronjob monitoring
      - /var/run/dbus:/var/run/dbus:ro
      - /run/systemd:/run/systemd:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - obster-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: obster-backend
    ports:
      - "8000:8000"
    volumes:
      # Project sources for status scanning
      - ${PROJECTS_PATH:-/home/crawd_user/project}:/home/crawd_user/project:ro
      # Execution logs for log panel
      - ${LOGS_PATH:-/home/crawd_user/.openclaw/workspace/logs}:/home/crawd_user/.openclaw/workspace/logs:ro
      # Systemd sockets for cronjob monitoring
      - /var/run/dbus:/var/run/dbus:ro
      - /run/systemd:/run/systemd:ro
    environment:
      - PROJECTS_PATH=${PROJECTS_PATH:-/home/crawd_user/project}
      - LOGS_PATH=${LOGS_PATH:-/home/crawd_user/.openclaw/workspace/logs/executions}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TIMEOUT_MINUTES=${TIMEOUT_MINUTES:-30}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-30000}
    restart: unless-stopped
    privileged: true
    networks:
      - obster-network

networks:
  obster-network:
    driver: bridge